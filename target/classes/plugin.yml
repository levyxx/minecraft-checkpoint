name: CheckpointPlugin
version: 1.5.0
main: checkpoint.CheckpointPlugin
api-version: '1.20'
author: levyxx
description: Enables per-player checkpoints using slimeballs and nether stars.
commands:
  cp:
    description: Manage personal named checkpoints.
    usage: |-
      /cp set <name> [description]
      /cp update <name>
      /cp delete <name>
      /cp rename <old-name> <new-name>
      /cp description <name> <description>
      /cp items
      /cp help
